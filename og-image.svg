<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="125" cy="-88" r="97" fill="#f57c00" opacity="0.16"/>
    <circle cx="1123" cy="-50" r="52" fill="#f57c00" opacity="0.17"/>
    <circle cx="1087" cy="380" r="98" fill="#f57c00" opacity="0.18"/>
    <circle cx="263" cy="410" r="97" fill="#f57c00" opacity="0.10"/>
    <circle cx="30" cy="562" r="21" fill="#f57c00" opacity="0.17"/>
    <circle cx="955" cy="450" r="26" fill="#f57c00" opacity="0.05"/>
    <rect x="691" y="173" width="68" height="57" rx="8" fill="#e65100" opacity="0.14" transform="rotate(4, 603, 102)"/>
    <rect x="669" y="311" width="65" height="86" rx="8" fill="#e65100" opacity="0.08" transform="rotate(40, 93, 281)"/>
    <rect x="240" y="78" width="77" height="81" rx="8" fill="#e65100" opacity="0.09" transform="rotate(35, 32, 626)"/>
    <rect x="639" y="114" width="48" height="89" rx="8" fill="#e65100" opacity="0.10" transform="rotate(9, 904, 527)"/>
    <rect x="932" y="484" width="27" height="63" rx="8" fill="#e65100" opacity="0.10" transform="rotate(36, 106, 272)"/>
    <rect x="532" y="73" width="52" height="54" rx="8" fill="#e65100" opacity="0.06" transform="rotate(6, 589, 84)"/>
    <rect x="1140" y="651" width="23" height="62" rx="8" fill="#e65100" opacity="0.04" transform="rotate(17, -47, 146)"/>
    <rect x="345" y="318" width="84" height="88" rx="8" fill="#e65100" opacity="0.09" transform="rotate(24, 1094, 249)"/>
    <polygon points="770,673 797,727 743,727" fill="#f57c00" opacity="0.11"/>
    <polygon points="162,99 257,289 67,289" fill="#f57c00" opacity="0.10"/>
    <polygon points="813,297 857,385 769,385" fill="#f57c00" opacity="0.11"/>
    <polygon points="71,106 126,216 16,216" fill="#f57c00" opacity="0.11"/>

  <!-- Wave at bottom -->
  <path d="M0,566 C360,598 840,534 1200,566 L1200,630 L0,630Z" fill="#f57c00" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    강남 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — AI트렌드
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffcc80" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffcc80" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 강남 셔츠룸 — AI트렌드
  </text>
</svg>